<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>

    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
            rel="stylesheet">

    <style>

        .file-row:hover{
            background:#f5f5f5;
        }

        .icon{
            width:20px;
        }

    </style>

</head>

<body class="container mt-4">

<h3>FTP Browser</h3>

<!-- Breadcrumb -->

<nav>

    <ol class="breadcrumb">

        <li class="breadcrumb-item"
            th:each="crumb : ${breadcrumbs}">

            <a th:href="@{/ftp/ftp-browser(path=${crumb.path})}"
               th:text="${crumb.name}"></a>

        </li>

    </ol>

</nav>

<!-- File List -->
<table class="table">

    <thead>

    <tr>

        <th>Name</th>
        <th>Size</th>
        <th>Modified</th>

    </tr>

    </thead>

    <tbody>

    <tr class="file-row"
        th:each="f : ${files}">

        <td>

            <span th:if="${f.directory}">📁</span>
            <span th:if="${!f.directory}">📄</span>

            <a th:if="${f.directory}"
               th:href="@{/ftp/ftp-browser(path=${f.path})}"
               th:text="${f.name}"></a>

            <a th:if="${!f.directory}"
               th:href="@{/ftp/download(filePath=${f.path})}"
               th:text="${f.name}"></a>
        </td>

        <td th:text="${f.directory ? '-' : f.size}"></td>

        <td th:text="${#temporals.format(f.modified,'yyyy-MM-dd HH:mm')}"></td>

    </tr>

    </tbody>

</table>

</body>
</html>
