
spring.config.activate.on-profile=debug-security-allows-all

# debug-security-allows-all: security active, but allows all
app.security.permits-all=true

logging.level.org.springframework.web=DEBUG

# ftp Configuration
ftp.host=localhost
ftp.port=21
ftp.username=ftpuser
ftp.password=ftppassword

# ftp Directories
ftp.remote-directory=/uploads
ftp.local-directory=./ftp-downloads

# ftp Connection Settings
ftp.timeout=30000

# Logging Configuration
logging.level.org.springframework.integration=DEBUG
logging.level.com.jcraft.jsch=DEBUG
