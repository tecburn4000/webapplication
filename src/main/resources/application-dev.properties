

app.security.permits-all=false
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.integration.file.remote.session=DEBUG

spring.config.activate.on-profile=dev

# ftp Configuration
ftp.host=localhost
ftp.port=21
ftp.username=spring
ftp.password=spring
ftp.remote-directory=/log-data
ftp.local-directory=c:/temp/ftp-test/downloads
ftp.passive-mode=true

# ftp Connection Settings
ftp.connection-timeout=10000
ftp.default-timeout=10000

